<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务中心</title>
    <style>
        :root {
            --bg-1: #0a1c2f;
            --bg-2: #16324f;
            --panel: rgba(12, 30, 50, 0.64);
            --line: rgba(171, 219, 255, 0.2);
            --text-main: #ecf9ff;
            --text-sub: #b6d2e5;
            --accent: #1bc5bd;
            --accent-2: #34d399;
            --danger: #ff7a7a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 12% 10%, rgba(20, 179, 199, 0.36), transparent 38%),
                radial-gradient(circle at 86% 18%, rgba(52, 211, 153, 0.28), transparent 35%),
                linear-gradient(155deg, var(--bg-1), var(--bg-2));
        }

        .ambient {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .ambient::before,
        .ambient::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(18px);
            opacity: 0.65;
            animation: float 10s ease-in-out infinite;
        }

        .ambient::before {
            width: 320px;
            height: 320px;
            left: -80px;
            bottom: -80px;
            background: rgba(96, 165, 250, 0.35);
        }

        .ambient::after {
            width: 260px;
            height: 260px;
            right: -70px;
            top: -50px;
            background: rgba(52, 211, 153, 0.3);
            animation-delay: 1.4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-16px); }
        }

        #loading-container,
        #menu-container {
            width: min(860px, 100%);
            border-radius: 24px;
            border: 1px solid var(--line);
            background: var(--panel);
            backdrop-filter: blur(10px);
            box-shadow: 0 24px 55px rgba(2, 10, 22, 0.4);
            position: relative;
            z-index: 1;
        }

        #loading-container {
            padding: 54px 36px;
            text-align: center;
        }

        #loading-title {
            font-size: clamp(26px, 4vw, 38px);
            margin: 0 0 26px;
            letter-spacing: 1px;
        }

        .progress-track {
            height: 14px;
            width: min(520px, 100%);
            margin: 0 auto;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.14);
            overflow: hidden;
        }

        .progress-bar-inner {
            width: 0;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            transition: width 0.25s ease;
        }

        #loading-text {
            margin-top: 14px;
            color: var(--text-sub);
            font-size: 15px;
        }

        #menu-container {
            display: none;
            padding: 34px 28px 24px;
            animation: reveal 0.4s ease;
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-header {
            margin-bottom: 22px;
        }

        .menu-header h1 {
            margin: 0 0 8px;
            font-size: clamp(28px, 4vw, 40px);
        }

        .menu-header p {
            margin: 0;
            color: var(--text-sub);
            font-size: 15px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .menu-option {
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 18px;
            background: rgba(255, 255, 255, 0.06);
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .menu-option strong {
            display: block;
            font-size: 18px;
            margin-bottom: 6px;
        }

        .menu-option span {
            display: block;
            color: var(--text-sub);
            font-size: 14px;
            line-height: 1.6;
        }

        .menu-option:hover {
            transform: translateY(-2px);
            border-color: rgba(27, 197, 189, 0.58);
            background: rgba(27, 197, 189, 0.12);
        }

        .menu-option.logout:hover {
            border-color: rgba(255, 122, 122, 0.55);
            background: rgba(255, 122, 122, 0.13);
        }

        @media (max-width: 760px) {
            #loading-container {
                padding: 40px 20px;
            }

            #menu-container {
                padding: 22px 16px 18px;
            }

            .menu-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="ambient"></div>

    <div id="loading-container">
        <h2 id="loading-title">服务中心加载中</h2>
        <div class="progress-track">
            <div class="progress-bar-inner"></div>
        </div>
        <div id="loading-text">正在准备功能模块，请稍候...</div>
    </div>

    <div id="menu-container">
        <div class="menu-header">
            <h1>欢迎使用服务中心</h1>
            <p>请选择你要进入的模块。</p>
        </div>
        <div class="menu-grid">
            <div class="menu-option" id="chat-service">
                <strong>聊天服务</strong>
                <span>多轮会话、历史记录、模型切换。</span>
            </div>
            <div class="menu-option" id="image-service">
                <strong>图像识别服务</strong>
                <span>上传图片并返回识别结果。</span>
            </div>
            <div class="menu-option logout" id="logout">
                <strong>退出登录</strong>
                <span>结束当前会话并返回登录页。</span>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const progressBar = document.querySelector('.progress-bar-inner');
            const loadingContainer = document.getElementById('loading-container');
            const menuContainer = document.getElementById('menu-container');

            let percent = 0;
            const interval = setInterval(() => {
                percent += 8 + Math.floor(Math.random() * 9);
                progressBar.style.width = Math.min(percent, 100) + '%';
                if (percent >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        loadingContainer.style.display = 'none';
                        menuContainer.style.display = 'block';
                    }, 250);
                }
            }, 130);
        });

        function loadService(path, errorMsg) {
            fetch(path, { method: 'GET', headers: { 'Accept': 'text/html' } })
                .then(res => res.text())
                .then(html => {
                    document.open();
                    document.write(html);
                    document.close();
                })
                .catch(() => alert(errorMsg));
        }

        document.getElementById('chat-service').addEventListener('click', () => {
            loadService('/chat', '进入聊天服务失败');
        });

        document.getElementById('image-service').addEventListener('click', () => {
            loadService('/upload', '进入图像识别服务失败');
        });

        document.getElementById('logout').addEventListener('click', () => {
            const userId = sessionStorage.getItem('userId');
            fetch('/user/logout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: userId, type: 'manual', gameType: 0 })
            })
                .then(res => {
                    if (!res.ok) throw new Error('Logout failed');
                    return fetch('/', { method: 'GET', headers: { 'Accept': 'text/html' } });
                })
                .then(res => res.text())
                .then(html => {
                    sessionStorage.clear();
                    document.open();
                    document.write(html);
                    document.close();
                })
                .catch(() => alert('退出登录失败'));
        });

        window.addEventListener('beforeunload', function () {
            const userId = sessionStorage.getItem('userId');
            if (userId) {
                const data = new Blob([JSON.stringify({ userId: userId, type: 'refresh', gameType: 0 })], {
                    type: 'application/json'
                });
                navigator.sendBeacon('/user/logout', data);
            }
        });

        window.addEventListener('load', function () {
            const userId = sessionStorage.getItem('userId');
            if (!userId) {
                window.location.href = '/entry';
            }
        });
    </script>
</body>
</html>
