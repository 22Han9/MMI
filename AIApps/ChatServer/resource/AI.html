<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天服务</title>
    <style>
        :root {
            --bg-1: #0b1f35;
            --bg-2: #144063;
            --panel: rgba(11, 30, 49, 0.72);
            --line: rgba(154, 210, 236, 0.2);
            --text-main: #f0fbff;
            --text-sub: #a8c9db;
            --accent: #1bc5bd;
            --accent-2: #34d399;
            --input-bg: rgba(235, 252, 255, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 16px;
            font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 8% 12%, rgba(56, 189, 248, 0.26), transparent 30%),
                radial-gradient(circle at 88% 14%, rgba(52, 211, 153, 0.24), transparent 34%),
                linear-gradient(155deg, var(--bg-1), var(--bg-2));
        }

        .app-shell {
            max-width: 1400px;
            margin: 0 auto;
            height: calc(100vh - 32px);
            border-radius: 22px;
            border: 1px solid var(--line);
            background: var(--panel);
            backdrop-filter: blur(10px);
            box-shadow: 0 24px 56px rgba(3, 12, 24, 0.45);
            display: flex;
            overflow: hidden;
        }

        .session-list {
            width: 280px;
            border-right: 1px solid var(--line);
            background: rgba(7, 20, 33, 0.35);
            display: flex;
            flex-direction: column;
            min-width: 220px;
        }

        .session-list-header {
            padding: 16px 14px 12px;
            border-bottom: 1px solid var(--line);
        }

        .session-list-header .title {
            font-size: 16px;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 0.4px;
        }

        .new-chat-btn {
            width: 100%;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 0;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(27, 197, 189, 0.24);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .new-chat-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 13px 24px rgba(27, 197, 189, 0.34);
        }

        .session-list ul {
            list-style: none;
            margin: 0;
            padding: 10px;
            overflow-y: auto;
            flex: 1;
        }

        .session-list li {
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            color: var(--text-sub);
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
            border: 1px solid transparent;
        }

        .session-list li:hover {
            background: rgba(27, 197, 189, 0.15);
            color: #ddffff;
        }

        .session-list li.active {
            background: rgba(27, 197, 189, 0.22);
            border-color: rgba(27, 197, 189, 0.4);
            color: #ffffff;
            font-weight: 600;
        }

        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid var(--line);
            background: rgba(7, 20, 33, 0.25);
            flex-wrap: wrap;
        }

        .top-bar button,
        .top-bar select {
            border: none;
            border-radius: 9px;
            font-size: 13px;
            padding: 8px 12px;
            font-weight: 600;
        }

        .top-bar button {
            cursor: pointer;
            background: rgba(255, 255, 255, 0.12);
            color: #e9fdff;
            border: 1px solid rgba(255, 255, 255, 0.16);
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .top-bar button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .top-bar .sync-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border-color: rgba(27, 197, 189, 0.45);
        }

        .top-bar label {
            color: var(--text-sub);
            font-size: 13px;
        }

        .top-bar select {
            background: rgba(255, 255, 255, 0.16);
            color: #f3feff;
            border: 1px solid rgba(255, 255, 255, 0.24);
            outline: none;
        }

        .top-bar select option {
            color: #112333;
        }

        .chat-container {
            flex: 1;
            padding: 18px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .empty-tip {
            margin: auto;
            text-align: center;
            color: var(--text-sub);
            line-height: 1.8;
            padding: 10px 16px;
            border: 1px dashed rgba(168, 201, 219, 0.38);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
        }

        .message {
            max-width: min(78%, 760px);
            border-radius: 16px;
            padding: 12px 14px;
            line-height: 1.7;
            word-break: break-word;
            animation: popIn 0.18s ease;
        }

        .message-meta {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 6px;
        }

        .message-content p {
            margin: 0.1em 0;
        }

        .user {
            align-self: flex-end;
            background: linear-gradient(135deg, #24b2d6, #24caaa);
            color: #fff;
            border-bottom-right-radius: 5px;
            box-shadow: 0 10px 18px rgba(17, 80, 98, 0.35);
        }

        .assistant {
            align-self: flex-start;
            background: rgba(243, 252, 255, 0.95);
            color: #163347;
            border-bottom-left-radius: 5px;
            box-shadow: 0 10px 18px rgba(5, 16, 30, 0.2);
        }

        .tts-btn {
            margin-top: 8px;
            border: none;
            border-radius: 8px;
            padding: 5px 9px;
            font-size: 12px;
            cursor: pointer;
            background: rgba(16, 102, 86, 0.13);
            color: #0f6457;
        }

        .tts-btn:hover {
            background: rgba(16, 102, 86, 0.2);
        }

        .input-box {
            padding: 12px 14px;
            border-top: 1px solid var(--line);
            display: flex;
            gap: 10px;
            background: rgba(7, 20, 33, 0.25);
        }

        textarea {
            flex: 1;
            min-height: 52px;
            max-height: 180px;
            resize: vertical;
            border-radius: 12px;
            border: 1px solid rgba(199, 236, 255, 0.3);
            background: var(--input-bg);
            color: #effdff;
            padding: 12px;
            font-size: 14px;
            outline: none;
        }

        textarea:focus {
            border-color: rgba(27, 197, 189, 0.8);
            box-shadow: 0 0 0 3px rgba(27, 197, 189, 0.2);
        }

        button[type="submit"] {
            border: none;
            border-radius: 12px;
            padding: 0 22px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            box-shadow: 0 10px 20px rgba(27, 197, 189, 0.28);
        }

        button[type="submit"]:hover {
            filter: brightness(1.05);
        }

        @keyframes popIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            body {
                padding: 8px;
            }

            .app-shell {
                height: calc(100vh - 16px);
                border-radius: 16px;
            }

            .session-list {
                width: 220px;
            }
        }

        @media (max-width: 760px) {
            .app-shell {
                flex-direction: column;
            }

            .session-list {
                width: 100%;
                min-height: 155px;
                border-right: none;
                border-bottom: 1px solid var(--line);
            }

            .chat-container {
                padding: 12px;
            }

            .message {
                max-width: 92%;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.0/dist/purify.min.js"></script>
</head>
<body>
    <div class="app-shell">
        <div class="session-list">
            <div class="session-list-header">
                <div class="title">会话列表</div>
                <button class="new-chat-btn" id="newChatBtn">+ 新建会话</button>
            </div>
            <ul id="sessionList"></ul>
        </div>

        <div class="chat-section">
            <div class="top-bar">
                <button class="back-btn" onclick="window.location.href='/menu'">返回菜单</button>
                <button class="sync-btn" id="sync-history-btn">同步历史</button>
                <label for="modelType">模型</label>
                <select id="modelType">
                    <option value="1" selected>阿里百炼</option>
                    <option value="2">豆包</option>
                    <option value="3">百炼RAG</option>
                    <option value="4">阿里百炼MCP</option>
                </select>
            </div>

            <div class="chat-container" id="chat-container">
                <div class="empty-tip" id="empty-tip">
                    当前还没有消息。<br>
                    点击“新建会话”或直接输入问题开始对话。
                </div>
            </div>

            <form class="input-box" id="chat-form">
                <textarea id="question" placeholder="请输入你的问题..." required></textarea>
                <button type="submit">发送</button>
            </form>
        </div>
    </div>

    <script>
        let currentSessionId = 'temp';
        let tempSession = true;
        const sessions = {};
        const sessionList = document.getElementById('sessionList');
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const questionInput = document.getElementById('question');
        const syncBtn = document.getElementById('sync-history-btn');
        const modelTypeSelect = document.getElementById('modelType');
        const newChatBtn = document.getElementById('newChatBtn');
        const emptyTip = document.getElementById('empty-tip');

        function toggleEmptyTip() {
            if (!emptyTip) return;
            emptyTip.style.display = chatContainer.children.length > 1 ? 'none' : 'block';
        }

        async function playTTS(text) {
            try {
                const res = await fetch('/chat/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                if (data.success && data.url) {
                    const audio = new Audio(data.url);
                    audio.play();
                } else {
                    alert('无法获取语音');
                }
            } catch (err) {
                console.error(err);
                alert('请求语音接口失败');
            }
        }

        function appendMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', role);
            const safeHtml = DOMPurify.sanitize(marked.parse(content));
            const escapedContent = content.replace(/`/g, '\\`').replace(/\$/g, '\\$');
            const roleText = role === 'user' ? '我' : '助手';
            const ttsButton = role === 'assistant'
                ? `<button class="tts-btn" onclick="playTTS(\`${escapedContent}\`)">朗读</button>`
                : '';
            msgDiv.innerHTML = `
                <div class="message-meta">${roleText}</div>
                <div class="message-content">${safeHtml}</div>
                ${ttsButton}
            `;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            toggleEmptyTip();
        }

        function clearMessages() {
            chatContainer.innerHTML = '';
            chatContainer.appendChild(emptyTip);
            toggleEmptyTip();
        }

        function renderSessionList() {
            sessionList.innerHTML = '';
            for (const id in sessions) {
                const li = document.createElement('li');
                li.textContent = sessions[id].name || `会话 ${id}`;
                li.dataset.id = id;
                if (id === currentSessionId) li.classList.add('active');
                li.onclick = () => switchSession(id);
                sessionList.appendChild(li);
            }
        }

        async function switchSession(id) {
            currentSessionId = String(id);
            tempSession = false;
            clearMessages();
            if (!sessions[id].messages || sessions[id].messages.length === 0) {
                try {
                    const res = await fetch('/chat/history', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sessionId: currentSessionId })
                    });
                    const data = await res.json();
                    if (data.success && Array.isArray(data.history)) {
                        sessions[id].messages = [];
                        data.history.forEach(item => {
                            sessions[id].messages.push({
                                role: item.is_user ? 'user' : 'assistant',
                                content: item.content
                            });
                        });
                    }
                } catch (err) {
                    console.error('获取历史失败', err);
                }
            }
            sessions[id].messages.forEach(m => appendMessage(m.role, m.content));
            renderSessionList();
        }

        newChatBtn.addEventListener('click', () => {
            currentSessionId = 'temp';
            tempSession = true;
            clearMessages();
            renderSessionList();
        });

        chatForm.addEventListener('submit', async e => {
            e.preventDefault();
            const question = questionInput.value.trim();
            if (!question) return;

            appendMessage('user', question);

            if (tempSession) {
                try {
                    const response = await fetch('/chat/send-new-session', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ question, modelType: modelTypeSelect.value })
                    });
                    const data = await response.json();
                    if (data.success) {
                        const sessionId = String(data.sessionId);
                        sessions[sessionId] = {
                            name: '新会话',
                            messages: [
                                { role: 'user', content: question },
                                { role: 'assistant', content: data.Information }
                            ]
                        };
                        currentSessionId = sessionId;
                        tempSession = false;
                        renderSessionList();
                        appendMessage('assistant', data.Information);
                    } else {
                        appendMessage('assistant', '[错误] ' + (data.message || '未知错误'));
                    }
                } catch (err) {
                    console.error(err);
                    appendMessage('assistant', '[错误] 无法连接到服务器');
                }
            } else {
                sessions[currentSessionId].messages.push({ role: 'user', content: question });
                try {
                    const response = await fetch('/chat/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            question,
                            modelType: modelTypeSelect.value,
                            sessionId: currentSessionId
                        })
                    });
                    const data = await response.json();
                    if (data.success) {
                        appendMessage('assistant', data.Information);
                        sessions[currentSessionId].messages.push({
                            role: 'assistant',
                            content: data.Information
                        });
                    } else {
                        appendMessage('assistant', '[错误] ' + (data.message || '未知错误'));
                    }
                } catch (err) {
                    console.error(err);
                    appendMessage('assistant', '[错误] 无法连接到服务器');
                }
            }

            questionInput.value = '';
        });

        syncBtn.addEventListener('click', async () => {
            if (!currentSessionId || tempSession) {
                alert('请选择已有会话进行同步');
                return;
            }
            try {
                const res = await fetch('/chat/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId: currentSessionId })
                });
                const data = await res.json();
                if (data.success && Array.isArray(data.history)) {
                    sessions[currentSessionId].messages = [];
                    clearMessages();
                    data.history.forEach(item => {
                        appendMessage(item.is_user ? 'user' : 'assistant', item.content);
                        sessions[currentSessionId].messages.push({
                            role: item.is_user ? 'user' : 'assistant',
                            content: item.content
                        });
                    });
                } else {
                    alert('[错误] 无法获取历史数据');
                }
            } catch (err) {
                console.error(err);
                alert('[错误] 请求历史数据失败');
            }
        });

        async function loadSessions() {
            try {
                const res = await fetch('/chat/sessions');
                const data = await res.json();
                if (data.success && Array.isArray(data.sessions)) {
                    data.sessions.forEach(s => {
                        const sid = String(s.sessionId);
                        sessions[sid] = { name: s.name || `会话 ${sid}`, messages: [] };
                    });
                    renderSessionList();
                }
            } catch (err) {
                console.error('获取会话列表失败', err);
            }
        }

        loadSessions();
        toggleEmptyTip();
    </script>
</body>
</html>
