<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>页面未找到</title>
<style>
    :root {
        --bg-1: #0b1f35;
        --bg-2: #144063;
        --panel: rgba(11, 30, 49, 0.72);
        --line: rgba(154, 210, 236, 0.2);
        --text-main: #f0fbff;
        --text-sub: #a8c9db;
        --accent: #1bc5bd;
        --accent-2: #34d399;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 18px;
        font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", "Microsoft YaHei", sans-serif;
        color: var(--text-main);
        background:
            radial-gradient(circle at 8% 12%, rgba(56, 189, 248, 0.26), transparent 30%),
            radial-gradient(circle at 88% 14%, rgba(52, 211, 153, 0.24), transparent 34%),
            linear-gradient(155deg, var(--bg-1), var(--bg-2));
    }

    .container {
        width: min(520px, 100%);
        text-align: center;
        border-radius: 22px;
        border: 1px solid var(--line);
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: 0 24px 56px rgba(3, 12, 24, 0.45);
        padding: 40px 26px 32px;
    }

    h1 {
        font-size: clamp(66px, 12vw, 92px);
        margin: 0;
        letter-spacing: 1px;
        color: #e4fbff;
    }

    p {
        margin: 12px 0 24px;
        font-size: 17px;
        color: var(--text-sub);
        line-height: 1.7;
    }

    .btn {
        display: inline-block;
        padding: 11px 22px;
        border-radius: 12px;
        text-decoration: none;
        color: #fff;
        font-weight: 600;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        box-shadow: 0 10px 20px rgba(27, 197, 189, 0.3);
    }

    .btn:hover {
        filter: brightness(1.05);
    }
</style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>抱歉，你访问的页面不存在或已被移动。</p>
        <a href="/menu" class="btn">返回服务中心</a>
    </div>
</body>
</html>
